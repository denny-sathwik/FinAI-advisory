{% extends "base.html" %}
{% block title %}Log In{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-brand">
      <div class="brand-logo brand-logo-auth">
        <span class="brand-copy">
          <span class="brand-name">FinAI Advisor</span>
          <span class="brand-subtitle">AI financial planning</span>
        </span>
      </div>
    </div>
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your account</p>

    <div id="alert" class="alert alert-error hidden"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
          <button type="button" class="input-group-btn" id="toggle-pw" title="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-2" id="submit-btn">Sign In</button>
    </form>

    <p class="text-center mt-2" style="font-size:0.85rem">
      Don't have an account? <a href="/register">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('toggle-pw').addEventListener('click', function() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
});

document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const alert = document.getElementById('alert');
  const btn = document.getElementById('submit-btn');
  const email = this.email.value.trim();
  const password = this.password.value;

  setLoading(btn, true, 'Signing in...');
  hideAlert(alert);

  try {
    const data = await api.post('/api/auth/login', { email, password });
    store.set('user', data.user);
    window.location.href = '/dashboard';
  } catch (err) {
    showAlert(alert, err.message, 'error');
    setLoading(btn, false);
  }
});
</script>
{% endblock %}
