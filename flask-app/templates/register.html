{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-brand">
      <div class="brand-logo brand-logo-auth">
        <span class="brand-copy">
          <span class="brand-name">FinAI Advisor</span>
          <span class="brand-subtitle">AI financial planning</span>
        </span>
      </div>
    </div>
    <h2>Create your account</h2>
    <p class="subtitle">Start managing your finances with AI</p>

    <div id="alert" class="alert alert-error hidden"></div>
    <div id="success" class="alert alert-success hidden"></div>

    <a href="/api/auth/google/login" class="btn btn-google btn-block">
      <svg aria-hidden="true" width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.58 2.68-3.9 2.68-6.62z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.35 0-4.34-1.58-5.05-3.72H.94v2.34A9 9 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.95 10.7a5.41 5.41 0 0 1 0-3.4V4.96H.94a9 9 0 0 0 0 8.08l3.01-2.34z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58A8.64 8.64 0 0 0 9 0 9 9 0 0 0 .94 4.96L3.95 7.3C4.66 5.16 6.65 3.58 9 3.58z"/>
      </svg>
      Sign up with Google
    </a>

    <div class="auth-divider">or</div>

    <form id="register-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" name="fname" class="form-control" placeholder="John" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" name="lname" class="form-control" placeholder="Doe" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" name="password" id="password" class="form-control" placeholder="Min. 8 characters" required>
          <button type="button" class="input-group-btn" id="toggle-pw" title="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-2" id="submit-btn">Create Account</button>
    </form>

    <p class="text-center mt-2" style="font-size:0.85rem">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('toggle-pw').addEventListener('click', function() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
});

document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const alert = document.getElementById('alert');
  const success = document.getElementById('success');
  const btn = document.getElementById('submit-btn');

  setLoading(btn, true, 'Creating account...');
  hideAlert(alert);

  try {
    await api.post('/api/auth/register', {
      fname: this.fname.value.trim(),
      lname: this.lname.value.trim(),
      email: this.email.value.trim(),
      password: this.password.value,
    });
    showAlert(success, 'Account created! Redirecting to login...', 'success');
    setTimeout(() => window.location.href = '/login', 1500);
  } catch (err) {
    showAlert(alert, err.message, 'error');
    setLoading(btn, false);
  }
});
</script>
{% endblock %}
