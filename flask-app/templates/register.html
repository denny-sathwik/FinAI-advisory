{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-brand">
      <div class="brand-logo brand-logo-auth">
        <span class="brand-copy">
          <span class="brand-name">FinAI Advisor</span>
          <span class="brand-subtitle">AI financial planning</span>
        </span>
      </div>
    </div>
    <h2>Create your account</h2>
    <p class="subtitle">Start managing your finances with AI</p>

    <div id="alert" class="alert alert-error hidden"></div>
    <div id="success" class="alert alert-success hidden"></div>

    <form id="register-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" name="fname" class="form-control" placeholder="John" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" name="lname" class="form-control" placeholder="Doe" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" name="password" id="password" class="form-control" placeholder="Min. 8 characters" required>
          <button type="button" class="input-group-btn" id="toggle-pw" title="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-2" id="submit-btn">Create Account</button>
    </form>

    <p class="text-center mt-2" style="font-size:0.85rem">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('toggle-pw').addEventListener('click', function() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
});

document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const alert = document.getElementById('alert');
  const success = document.getElementById('success');
  const btn = document.getElementById('submit-btn');

  setLoading(btn, true, 'Creating account...');
  hideAlert(alert);

  try {
    await api.post('/api/auth/register', {
      fname: this.fname.value.trim(),
      lname: this.lname.value.trim(),
      email: this.email.value.trim(),
      password: this.password.value,
    });
    showAlert(success, 'Account created! Redirecting to login...', 'success');
    setTimeout(() => window.location.href = '/login', 1500);
  } catch (err) {
    showAlert(alert, err.message, 'error');
    setLoading(btn, false);
  }
});
</script>
{% endblock %}
